<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"else if" (Senão Se):</title>
</head>
<body>
    <script>

        //Operadores condicionais, como "==", "!=", ">", "<", ">=" e "<=", são usados para comparar valores e criaar condições em declarações "if".
        var x = 10;
        var y =5;
        if(x > y){
            document.write("x é maior que y.");
        }
    </script>
</body>
</html>
