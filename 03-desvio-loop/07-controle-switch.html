<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintaxe Básica do "switch":</title>
</head>
<body>
    <script>
        var diaDaSemana =3;

        switch(diaDaSemana){
            case 1:
            document.write("hoje é segunda-feira");
            break;

            case 2:
                document.write("hoje é terça-feira.");
                break;
                
            case 3:
                document.write("hoje é quarta-feira");
                break;

            case 4: 
            document.write("hoje é quinta-feira");
            break;

            case 5:
                document.write("hoje é sexta-feira");
                break;

            case 6:
                document.write("hoje é sábado");
                break;
            case 7: 
                document.write("hoje é domingo");
                break;
             default:
                document.write("dia inválido");   

        }
    </script>
</body>
</html>
